<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{titulo}} - ChickenRunGo</title>
    <style>
        :root { --primary: #ff1e56; --bg: #0d0d0d; --surface: #1a1a1a; --text: #fff; --accent: #32e0c4; }
        body { font-family: 'Outfit', sans-serif; margin: 0; background: var(--bg); color: var(--text); line-height: 1.8; }
        nav { padding: 15px 5%; background: #000; border-bottom: 1px solid #222; }
        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #f9d423; font-size: 2.5rem; line-height: 1.2; }
        .meta { color: #666; font-size: 0.9rem; margin-bottom: 30px; }
        article img { width: 100%; border-radius: 15px; margin: 20px 0; }
        .cta-box { background: var(--surface); padding: 30px; border-radius: 20px; border-left: 5px solid var(--primary); margin: 40px 0; text-align: center; }
        .cta-btn { display: inline-block; padding: 15px 30px; background: var(--primary); color: white; text-decoration: none; border-radius: 50px; font-weight: bold; margin-top: 20px; }
        footer { background: #000; padding: 40px 5%; text-align: center; color: #444; font-size: 0.9rem; }
    </style>
</head>
<body>
    <nav><a href="../index.html" style="color: #f9d423; text-decoration: none; font-weight: 900;">CHICKEN RUN GO</a></nav>
    <div class="container">
        <article>
            <h1>{{titulo}}</h1>
            <div class="meta">Publicado por Agente Redactor Pro • {{fecha}}</div>
            <div class="content">
                {{contenido}}
            </div>
            
            <div class="cta-box">
                <h3>🎁 ¡Bono Exclusivo para Lectores!</h3>
                <p>Usa nuestro enlace verificado para conseguir hasta 4500€ de bienvenida hoy mismo.</p>
                <a href="../index.html" class="cta-btn">RECLAMAR MI BONO AHORA</a>
            </div>
        </article>
    </div>
    <footer>
        <p>&copy; 2026 ChickenRunGo • <a href="../privacidad.html" style="color: #666;">Privacidad</a></p>
    </footer>
</body>
</html>
